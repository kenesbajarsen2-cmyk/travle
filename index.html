<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка (image_62b3bf.jpg) -->
    <header class="hero">
        <div class="hero-content">
        </div>
    </header>

    <!-- О нас -->
    <section class="about">
        <h3>Почему именно наше туристическое агентство?</h3>
        <h2>Немного нашей уникальности</h2>
        <p>На нашем сайте вы можете просматривать расписание вылетов и прилетов, а также можете купить билеты и просмотреть нашу маленькую галерею.</p>
    </section>

    <!-- Карточки (image_62b37d.jpg) -->
    <section class="cards">
        <div class="card"><img src="Замок.jpg"></div>
        <div class="diamond-card"><img src="МестоОтдыха.jpg"></div>
        <div class="card"><img src="вид города.jpg"></div>
    </section>

    <!-- Расписание (image_62b37d.jpg) -->
    <section id="schedule" class="schedule-section">
        <div class="table-container">
            <img src="Рссписание.jpg" alt="Таблица расписания" class="schedule-img">
        </div>
    </section>

    <!-- Галерея ромбики (image_62b3d7.jpg) -->
    <section id="gallery" class="gallery-section">
        <h2>Галерея</h2>
        <div class="diamond-container">
            <div class="diamond"><img src="горы.jpg"></div>
            <div class="diamond"><img src="Остров.jpg"></div>
            <div class="diamond"><img src="Остров (2).jpg"></div>
            <div class="diamond"><img src="город.jpg"></div>
            <div class="diamond"><img src="горы.jpg"></div>
        </div>
    </section>

    <!-- Подвал (image_62b3d7.jpg) -->
    <footer id="contacts">
        <img src="СоцСети.jpg" alt="Контакты" class="footer-screen">
        <p class="copyright">&copy; 2026 Travel Time | Air</p>
    </footer>

</body>
</html>
